name: CI/CD

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  # 步驟 1：測試 Job (先前章節的 Pytest)
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - run: pytest -v --cov=app --cov-fail-under=70

  # 步驟 2：打包並自動部署 Job (本章核心)
  build-and-deploy:
    needs: test # 🔴 關鍵：測試一定要成功通過，才會執行這裏！
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    
    permissions:
      contents: read
      packages: write # ⭐ 允許推送到 GitHub Packages (GHCR)

    steps:
      - uses: actions/checkout@v4

      # 1. 登入到 GHCR 倉庫
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }} # 使用內建 Token，免額外設定

      # 2. Build Docker Image 並 Push
      - name: Build and Push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/4-learn/devops-demo:${{ github.sha }}
            ghcr.io/4-learn/devops-demo:latest

      # 3. 使用 Bash 關鍵指令更新 Config Repo
      - name: Update Config Repo
        env:
          CONFIG_REPO_TOKEN: ${{ secrets.CONFIG_REPO_TOKEN }}
        run: |
          if [ -z "$CONFIG_REPO_TOKEN" ]; then
            echo "::warning::CONFIG_REPO_TOKEN 未設，略過更新 Config Repo"
            exit 0
          fi
          
          # A. 用 Token 把你的 Config Repo clone 到本機運作
          git clone https://x-access-token:${CONFIG_REPO_TOKEN}@github.com/allenlee564/devops-config.git
          cd devops-config
          
          # B. 【核心 Shell 指令】用 sed 把舊的 image tag 替換成這次最新的 commit id (${{ github.sha }})

          sed -i "s|image: ghcr.io/.*/devops-demo:.*|image: ghcr.io/allenlee564/devops-demo:${{ github.sha }}|" k8s/deployment.yaml
          
          # C. 設定 Git 身份並推回 Config Repo
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add k8s/deployment.yaml
          git commit -m "chore: update image to ${{ github.sha }}" || echo "no change"
          git push
